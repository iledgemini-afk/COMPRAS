<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILED · Compras — Painel Operacional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080a; --bg2:#0d0d11; --txt:#f3f4f7; --mut:#9aa0ac;
  --red:#e10600; --red2:#ff2b38; --grn:#37c98a; --amber:#f2b53c; --blue:#3d74ff; --orange:#ff6a3d;
  --line:rgba(255,255,255,.08);
}
*{box-sizing:border-box}
html{color-scheme:dark}
body{
  margin:0; color:var(--txt);
  font-family:'Manrope',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(1200px 700px at 12% -8%, rgba(225,6,0,.10), transparent 55%),
    radial-gradient(1100px 650px at 92% -6%, rgba(61,116,255,.09), transparent 55%),
    linear-gradient(180deg, #0a0a0e 0%, var(--bg) 40%, #060608 100%);
  background-attachment:fixed;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
#particles{position:fixed; inset:0; z-index:0; pointer-events:none}
.subpix{position:fixed; top:0; left:0; right:0; height:4px; z-index:100; display:flex}
.subpix i{flex:1}
.subpix i:nth-child(1){background:#e10600}
.subpix i:nth-child(2){background:#f2b53c}
.subpix i:nth-child(3){background:#f5f5f5}
.subpix i:nth-child(4){background:#3d74ff}

::-webkit-scrollbar{width:11px; height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--red),#7a0500); border-radius:20px; border:2px solid transparent; background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,var(--red2),var(--red))}

.wrap{position:relative; z-index:1; max-width:1320px; margin:0 auto; padding:22px 20px 80px}

/* TOPBAR */
.topbar{display:flex; align-items:center; gap:18px; flex-wrap:wrap; margin:8px 0 20px}
.logo{height:46px; mix-blend-mode:screen; filter:drop-shadow(0 0 10px rgba(225,6,0,.35)); animation:logoGlow 3.4s ease-in-out infinite}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 7px rgba(225,6,0,.28))}50%{filter:drop-shadow(0 0 16px rgba(225,6,0,.55))}}
.brand{display:flex; flex-direction:column; line-height:1}
.brand b{font-weight:800; font-size:1.05rem; letter-spacing:-.01em}
.brand span{font-size:.7rem; letter-spacing:.22em; text-transform:uppercase; color:var(--mut); font-weight:700; margin-top:3px}
.topbar-right{margin-left:auto; display:flex; align-items:center; gap:12px; flex-wrap:wrap}
.updated{font-size:.72rem; color:var(--mut); text-align:right; line-height:1.35}
.updated b{color:var(--txt)}

.btn{
  font-family:inherit; font-size:.82rem; font-weight:700; color:var(--txt);
  background:rgba(0,0,0,.32); border:1px solid rgba(255,255,255,.12); border-radius:11px;
  padding:9px 14px; cursor:pointer; backdrop-filter:blur(8px); transition:.18s; display:inline-flex; align-items:center; gap:7px;
}
.btn:hover{border-color:var(--red); transform:translateY(-1px)}
.btn.red{background:linear-gradient(135deg,var(--red),var(--red2)); border-color:transparent; box-shadow:0 6px 18px rgba(225,6,0,.35)}
.btn.red:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.5; cursor:wait}

.health{display:inline-flex; align-items:center; gap:8px; font-size:.74rem; font-weight:700; padding:7px 12px; border-radius:20px; border:1px solid var(--line); background:rgba(255,255,255,.03)}
.health .dot{width:9px; height:9px; border-radius:50%; box-shadow:0 0 9px currentColor}
.health.ok{color:var(--grn)} .health.warn{color:var(--amber)} .health.crit{color:var(--red2)}

/* TABS */
.tabs{display:flex; gap:9px; flex-wrap:wrap; margin:0 0 22px}
.tab{
  font-family:inherit; font-size:.82rem; font-weight:700; color:var(--mut);
  background:rgba(0,0,0,.28); border:1px solid var(--line); border-radius:22px;
  padding:9px 16px; cursor:pointer; backdrop-filter:blur(8px); transition:.18s; white-space:nowrap;
}
.tab:hover{color:var(--txt); border-color:rgba(255,255,255,.18)}
.tab.active{
  color:#fff; background:linear-gradient(135deg,rgba(225,6,0,.32),rgba(255,43,56,.14));
  border-color:rgba(225,6,0,.6); box-shadow:0 6px 20px rgba(225,6,0,.25)
}

/* GLASS */
.glass{
  position:relative; border-radius:20px; padding:20px;
  background:linear-gradient(155deg, rgba(38,38,50,.55), rgba(14,14,20,.42));
  backdrop-filter:blur(30px) saturate(180%);
  box-shadow:0 12px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.16);
  overflow:hidden;
}
.glass::before{
  content:""; position:absolute; inset:0; border-radius:20px; padding:1px; pointer-events:none;
  background:linear-gradient(150deg, rgba(255,255,255,.4), rgba(255,255,255,.05) 45%, rgba(225,6,0,.35));
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
}
.glass::after{
  content:""; position:absolute; top:-40%; left:-10%; width:70%; height:80%; pointer-events:none;
  background:radial-gradient(closest-side, rgba(255,255,255,.10), transparent); filter:blur(6px);
}
.card-hover{transition:transform .2s, box-shadow .2s}
.card-hover:hover{transform:translateY(-3px); box-shadow:0 18px 46px rgba(0,0,0,.55), 0 0 0 1px rgba(225,6,0,.25), inset 0 1px 0 rgba(255,255,255,.18)}

/* GRID */
.grid{display:grid; gap:16px}
.g-kpi{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
.g-2{grid-template-columns:1.1fr .9fr}
.g-2e{grid-template-columns:1fr 1fr}
@media(max-width:880px){.g-2,.g-2e{grid-template-columns:1fr}}
.mb{margin-bottom:16px}

/* KPI */
.kpi .eyebrow{font-size:.64rem; letter-spacing:.2em; text-transform:uppercase; color:var(--mut); font-weight:700}
.kpi .num{font-weight:800; font-size:2rem; letter-spacing:-.03em; margin-top:8px; line-height:1}
.kpi .num small{font-size:.9rem; color:var(--mut); font-weight:700; letter-spacing:0}
.kpi .delta{margin-top:7px; font-size:.74rem; font-weight:700; display:flex; align-items:center; gap:5px}
.kpi .delta.up{color:var(--grn)} .kpi .delta.down{color:var(--red2)} .kpi .delta.flat{color:var(--mut)}
.hero .num{font-size:2.9rem}
.hero .eyebrow{color:#ffb3af}

/* SECTION TITLE */
.stitle{display:flex; align-items:center; gap:10px; font-weight:800; font-size:1.02rem; letter-spacing:-.01em; margin:2px 0 14px}
.stitle::before{content:""; width:4px; height:18px; border-radius:3px; background:linear-gradient(180deg,var(--red2),var(--red))}
.sub{font-size:.76rem; color:var(--mut); font-weight:600; margin:-8px 0 14px}

/* GAUGE */
.gauge-wrap{position:relative; height:200px}
.gauge-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none}
.gauge-center b{font-size:1.7rem; font-weight:800; letter-spacing:-.02em}
.gauge-center span{font-size:.68rem; text-transform:uppercase; letter-spacing:.16em; color:var(--mut); font-weight:700; margin-top:3px}

/* TABLE */
.tbl-wrap{border:1px solid var(--line); border-radius:14px; overflow:auto; max-height:520px}
table{width:100%; border-collapse:collapse; font-size:.8rem}
thead th{
  position:sticky; top:0; z-index:2; background:#101016; color:var(--mut);
  text-transform:uppercase; font-size:.63rem; letter-spacing:.08em; font-weight:700;
  text-align:left; padding:11px 12px; border-bottom:1px solid var(--line); white-space:nowrap;
}
tbody td{padding:9px 12px; border-bottom:1px solid rgba(255,255,255,.05); vertical-align:top}
tbody tr:nth-child(even){background:rgba(255,255,255,.02)}
tbody tr:hover{background:rgba(225,6,0,.06)}
td.num,th.num{text-align:right; font-variant-numeric:tabular-nums}
.mono{font-variant-numeric:tabular-nums}
.muted{color:var(--mut)}

/* CHIPS */
.chip{display:inline-flex; align-items:center; gap:6px; font-size:.68rem; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap}
.chip .d{width:7px; height:7px; border-radius:50%; box-shadow:0 0 7px currentColor}
.chip.ok{color:var(--grn); background:rgba(55,201,138,.12)}
.chip.warn{color:var(--amber); background:rgba(242,181,60,.12)}
.chip.crit{color:var(--red2); background:rgba(255,43,56,.12)}
.chip.info{color:var(--blue); background:rgba(61,116,255,.12)}

/* INPUTS */
select,input[type=text],input[type=date]{
  font-family:inherit; font-size:.8rem; color:var(--txt);
  background:rgba(0,0,0,.32); border:1px solid rgba(255,255,255,.12); border-radius:11px;
  padding:8px 11px; backdrop-filter:blur(8px); transition:.18s;
}
select:hover,input:hover{border-color:var(--red)}
select:focus,input:focus{outline:none; border-color:var(--red2); box-shadow:0 0 0 3px rgba(225,6,0,.15)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.7)}
.controls{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px}
.controls label{font-size:.68rem; text-transform:uppercase; letter-spacing:.1em; color:var(--mut); font-weight:700; margin-right:-4px}

.chart-box{position:relative; height:320px}
.chart-box.tall{height:440px}
.chart-box.sm{height:240px}

.minibar{height:7px; border-radius:4px; background:rgba(255,255,255,.07); overflow:hidden; margin-top:5px}
.minibar i{display:block; height:100%; border-radius:4px; background:linear-gradient(90deg,var(--red),var(--red2))}

.pill-stat{display:flex; align-items:baseline; gap:8px}
.pill-stat b{font-size:1.5rem; font-weight:800; letter-spacing:-.02em}
.pill-stat span{font-size:.72rem; color:var(--mut); font-weight:600}

.hide{display:none !important}
.center{text-align:center}
.loading{padding:60px 20px; text-align:center; color:var(--mut); font-weight:600}
.spin{width:34px; height:34px; border:3px solid rgba(255,255,255,.12); border-top-color:var(--red2); border-radius:50%; animation:sp 1s linear infinite; margin:0 auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
.note{font-size:.72rem; color:var(--mut); line-height:1.5; margin-top:10px; padding:10px 12px; border-left:2px solid var(--amber); background:rgba(242,181,60,.06); border-radius:0 8px 8px 0}
.footer{margin-top:30px; text-align:center; font-size:.7rem; color:var(--mut)}
.funnel-row{display:flex; align-items:center; gap:12px; margin-bottom:10px}
.funnel-bar{height:38px; border-radius:10px; display:flex; align-items:center; padding:0 14px; font-weight:800; color:#fff; font-size:.85rem; min-width:70px; box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}
.funnel-label{font-size:.78rem; font-weight:700; width:150px; flex-shrink:0}
.funnel-label small{display:block; color:var(--mut); font-weight:600; font-size:.68rem}
</style>
</head>

/* ---------- núcleo (validado em teste) ---------- */
function parseMoney(v){
  if(v==null) return 0; if(typeof v==='number') return isFinite(v)?v:0;
  let s=String(v).trim(); if(!s) return 0;
  s=s.replace(/r\$/ig,'').replace(/\s|\u00a0/g,'').replace(/[^0-9.,\-]/g,'');
  if(!s||s==='-'||s===','||s==='.') return 0;
  const hasDot=s.includes('.'),hasComma=s.includes(',');
  if(hasDot&&hasComma) s=s.replace(/\./g,'').replace(',','.');
  else if(hasComma) s=s.replace(',','.');
  const n=parseFloat(s); return isFinite(n)?n:0;
}
function monthFromIdx(idx){const n=parseInt(idx,10); if(!n||n<24000) return null;
  const ano=Math.floor((n-1)/12), mes=n-ano*12; if(mes<1||mes>12) return null;
  return {ano,mes,key:ano+'-'+String(mes).padStart(2,'0')};}
function monthFromDate(str){if(!str) return null; const m=String(str).match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(!m) return null; let ano=parseInt(m[3],10); if(ano<100) ano+=2000; const mes=parseInt(m[2],10);
  if(mes<1||mes>12) return null; return {ano,mes,key:ano+'-'+String(mes).padStart(2,'0')};}
const MES_NOME=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const norm=s=>String(s==null?'':s).trim();
const up=s=>norm(s).toUpperCase();
function headerIndex(headers){
  const idx={}; headers.forEach((h,i)=>{const k=up(h).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim(); idx[k]=i;});
  const find=(...names)=>{for(const nm of names){const k=nm.toUpperCase(); if(k in idx) return idx[k];} return -1;};
  return {id:find('ID SOLICITACAO','ID'),produto:find('PRODUTO'),setor:find('SETOR'),data:find('DATA'),
    valor:find('VALOR PAGO'),forn:find('FORNECEDOR'),nf:find('LINK NOTA FISCAL'),
    prev:find('PREVISAO ENTREGA','PREVISAO DE ENTREGA'),forma:find('FORMA DE PAGAMENTO'),
    placa:find('PLACA'),qtdSol:find('QTD SOLICITADA'),qtdComp:find('QTD COMPRADA'),
    plano:find('PLANO DE COMPRAS'),idCompra:find('ID COMPRA'),canal:find('CANAL'),
    concil:find('CONCILIADO'),idxmes:find('IDX_MES'),nparc:find('NPARC'),vparc:find('VLR_PARCELA')};
}
function buildPedidos(rows){
  if(!rows||!rows.length) return []; const H=headerIndex(rows[0]); const out=[];
  for(let i=1;i<rows.length;i++){const r=rows[i]; if(!r) continue;
    const id=norm(r[H.id]), produto=norm(r[H.produto]);
    if(!id&&!produto) continue; if(!id||id==='#REF!') continue;
    const valor=parseMoney(r[H.valor]);
    const mm=monthFromIdx(r[H.idxmes])||monthFromDate(r[H.data]);
    const prev=norm(r[H.prev]);
    out.push({id,produto,setor:norm(r[H.setor])||'—',data:norm(r[H.data]),valor,
      fornecedor:norm(r[H.forn])||'—', temNF:/abrir nota/i.test(norm(r[H.nf])), previsao:prev,
      forma:norm(r[H.forma])||'SEM FORMA', placa:up(r[H.placa]), plano:norm(r[H.plano]),
      idCompra:norm(r[H.idCompra]), canal:norm(r[H.canal]),
      idxmes:parseInt(r[H.idxmes],10)||0, mesKey:mm?mm.key:null,
      mesLabel:mm?(MES_NOME[mm.mes]+'/'+String(mm.ano).slice(2)):'—', mesNum:mm?mm.mes:0, ano:mm?mm.ano:0,
      entregue:/entregue/i.test(prev), pago:valor>0, aDefinir:/a definir/i.test(norm(r[H.forn]))});
  }
  return out;
}
function buildSolic(rows){
  if(!rows||!rows.length) return []; const out=[];
  for(let i=1;i<rows.length;i++){const r=rows[i]; if(!r) continue;
    const id=norm(r[0]),produto=norm(r[5]); if(!id&&!produto) continue;
    out.push({id,dataPedido:norm(r[1]),lider:norm(r[2]),setor:norm(r[3]),prioridade:up(r[4])||'—',
      produto,qtd:norm(r[6]),statusGestao:up(r[7]),statusCompra:up(r[8]),previsao:norm(r[9]),
      valorTotal:parseMoney(r[11]),placa:up(r[12])});}
  return out;
}
function buildTeto(rows){
  if(!rows||!rows.length) return {geral:{},setores:[]};
  const head=rows[0]; const cols=[];
  for(let c=1;c<head.length;c++){const m=String(head[c]).match(/(\d{1,2})\/(\d{4})/); if(m) cols.push({key:m[2]+'-'+m[1].padStart(2,'0'),c});}
  const geral={},setores=[];
  for(let i=1;i<rows.length;i++){const r=rows[i]; if(!r) continue; const nome=norm(r[0]); if(!nome) continue;
    const porMes={}; cols.forEach(cc=>porMes[cc.key]=parseMoney(r[cc.c]));
    if(/teto geral/i.test(nome)) Object.assign(geral,porMes); else setores.push({nome,porMes});}
  return {geral,setores};
}
const fmtBRL=n=>'R$ '+(Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK=n=>{n=Number(n)||0; if(Math.abs(n)>=1000) return 'R$ '+(n/1000).toLocaleString('pt-BR',{maximumFractionDigits:1})+'k'; return fmtBRL(n);};
const fmtInt=n=>(Number(n)||0).toLocaleString('pt-BR');
function groupSum(arr,keyFn){const m=new Map(); for(const x of arr){const k=keyFn(x); if(k==null) continue;
  const o=m.get(k)||{valor:0,qtd:0}; o.valor+=x.valor; o.qtd+=1; m.set(k,o);} return m;}
const porMes=p=>[...groupSum(p.filter(x=>x.mesKey),x=>x.mesKey).entries()].map(([k,v])=>({key:k,...v})).sort((a,b)=>a.key.localeCompare(b.key));
const porSetor=p=>[...groupSum(p,x=>x.setor).entries()].map(([k,v])=>({nome:k,...v})).sort((a,b)=>b.valor-a.valor);
const porFornecedor=p=>[...groupSum(p.filter(x=>x.pago&&x.fornecedor!=='—'&&!x.aDefinir),x=>x.fornecedor).entries()].map(([k,v])=>({nome:k,...v,ticket:v.valor/v.qtd})).sort((a,b)=>b.valor-a.valor);
const porForma=p=>[...groupSum(p.filter(x=>x.pago),x=>x.forma).entries()].map(([k,v])=>({nome:k,...v})).sort((a,b)=>b.valor-a.valor);
const porPlaca=p=>[...groupSum(p.filter(x=>x.placa&&x.placa!=='—'&&x.placa!==''),x=>x.placa).entries()].map(([k,v])=>({placa:k,...v})).sort((a,b)=>b.valor-a.valor);

/* ---------- estado ---------- */
const S={peds:[],solic:[],teto:{geral:{},setores:[]},mesKeys:[],mesAtual:null,charts:{},tab:'geral'};

/* ---------- fetch ---------- */
function fetchCSV(url){
  return new Promise((res,rej)=>{
    Papa.parse(url+"&_cb="+Date.now(),{download:true,skipEmptyLines:'greedy',
      complete:r=>res(r.data),error:e=>rej(e)});
  });
}
async function loadAll(){
  document.getElementById('reloadBtn').disabled=true;
  try{
    const [pRows,sRows,tRows]=await Promise.all([fetchCSV(SRC.pedidos),fetchCSV(SRC.solic),fetchCSV(SRC.teto)]);
    S.peds=buildPedidos(pRows); S.solic=buildSolic(sRows); S.teto=buildTeto(tRows);
    S.mesKeys=[...new Set(S.peds.filter(p=>p.mesKey).map(p=>p.mesKey))].sort();
    S.mesAtual=S.mesKeys[S.mesKeys.length-1]||null;
    document.getElementById('stamp').textContent=new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    setHealth();
    render();
  }catch(e){
    document.getElementById('app').innerHTML='<div class="glass loading">Não consegui ler os CSVs.<br><small>'+(e&&e.message||e)+'</small><br><br>Verifique se as planilhas continuam publicadas na web.</div>';
    setHealthState('crit','Falha na leitura');
  }finally{document.getElementById('reloadBtn').disabled=false;}
}

/* ---------- health ---------- */
function setHealthState(cls,txt){const h=document.getElementById('health'); h.className='health '+cls; document.getElementById('healthTxt').textContent=txt;}
function setHealth(){
  const emCompraSemValor=S.peds.filter(p=>!p.pago).length;
  const total=S.peds.length;
  const semValorPct=total?emCompraSemValor/total:0;
  if(!total){setHealthState('crit','Sem dados');}
  else if(semValorPct>0.4){setHealthState('warn',total+' linhas · '+emCompraSemValor+' sem valor');}
  else{setHealthState('ok',total+' linhas lidas');}
}

const TABS=[['geral','Visão Geral'],['evolucao','Evolução'],['setores','Setores'],['fornecedores','Fornecedores'],
  ['pagamentos','Pagamentos'],['frota','Frota'],['funil','Funil'],['pendencias','Pendências'],['explorar','Explorar']];
function buildTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(([k,l])=>
    `<button class="tab ${S.tab===k?'active':''}" data-t="${k}">${l}</button>`).join('');
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{S.tab=b.dataset.t; render(); window.scrollTo({top:0,behavior:'smooth'});});
}

/* ------- helpers de UI ------- */
function kpi(eyebrow,num,unit,delta){
  let d=''; if(delta){const cls=delta.dir; const sym=delta.dir==='up'?'▲':delta.dir==='down'?'▼':'▬';
    d=`<div class="delta ${cls}">${sym} ${delta.txt}</div>`;}
  return `<div class="glass card-hover kpi"><div class="eyebrow">${eyebrow}</div>
    <div class="num">${num}${unit?` <small>${unit}</small>`:''}</div>${d}</div>`;
}
function barRows(items,valKey,labelKey,max,fmt){
  fmt=fmt||fmtBRL;
  const mx=max||Math.max(...items.map(i=>i[valKey]),1);
  return items.map(i=>`<div style="margin-bottom:11px">
     <div style="display:flex;justify-content:space-between;gap:10px;font-size:.78rem;font-weight:600">
       <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i[labelKey]}</span>
       <span class="mono muted">${fmt(i[valKey])}</span></div>
     <div class="minibar"><i style="width:${Math.max(2,i[valKey]/mx*100).toFixed(1)}%"></i></div></div>`).join('');
}

/* ------- gasto do mês / teto ------- */
function gastoMes(key){return S.peds.filter(p=>p.mesKey===key).reduce((s,p)=>s+p.valor,0);}
function tetoMes(key){return S.teto.geral[key]||0;}

  const gastoPrev=prev?gastoMes(prev):0;
  let delta=null;
  if(prev&&gastoPrev>0){const dp=(gasto-gastoPrev)/gastoPrev*100;
    delta={dir:dp>0.5?'up':dp<-0.5?'down':'flat',txt:(dp>=0?'+':'')+dp.toFixed(0)+'% vs '+labelKey(prev)};}
  const totalGeral=S.peds.reduce((s,p)=>s+p.valor,0);
  const nPed=S.peds.length; const nPago=S.peds.filter(p=>p.pago).length;
  const ticket=nPago?totalGeral/nPago:0;
  const nForn=new Set(S.peds.filter(p=>p.pago&&!p.aDefinir).map(p=>p.fornecedor)).size;
  const semValor=S.peds.filter(p=>!p.pago).length;
  const pctTeto=teto?gasto/teto*100:0;

  const html=`
  <div class="controls">
    <label>Mês de referência</label>

  </div>
  <div class="grid g-2 mb">
    <div class="glass card-hover hero kpi">
      <div class="eyebrow">Gasto em ${mesLabel}</div>
      <div class="num">${fmtBRL(gasto)}</div>
      ${delta?`<div class="delta ${delta.dir}">${delta.dir==='up'?'▲':delta.dir==='down'?'▼':'▬'} ${delta.txt}</div>`:''}
      <div class="note" style="border-color:${pctTeto>100?'var(--red2)':pctTeto>85?'var(--amber)':'var(--grn)'}">
        Consumo do teto geral do mês (${fmtBRL(teto)}): <b>${pctTeto.toFixed(1)}%</b>
      </div>
    </div>
    <div class="glass card-hover">
      <div class="stitle">Teto geral · ${mesLabel}</div>
      <div class="gauge-wrap"><canvas id="gaugeMes"></canvas>
        <div class="gauge-center"><b style="color:${pctTeto>100?'var(--red2)':pctTeto>85?'var(--amber)':'var(--grn)'}">${pctTeto.toFixed(0)}%</b><span>${fmtK(gasto)} / ${fmtK(teto)}</span></div>
      </div>
    </div>
  </div>
  <div class="grid g-kpi mb">
    ${kpi('Total acumulado','R$ '+fmtInt(Math.round(totalGeral)),'mar–jul')}
    ${kpi('Linhas de compra',fmtInt(nPed))}
    ${kpi('Ticket médio',fmtBRL(ticket))}
    ${kpi('Fornecedores',fmtInt(nForn))}
    ${kpi('Sem valor lançado',fmtInt(semValor),'linhas')}

    </div>

function labelKey(k){if(!k) return '—'; const [a,m]=k.split('-'); return MES_NOME[+m]+'/'+a.slice(2);}

function drawGauge(id,pct){
  const el=document.getElementById(id); if(!el) return;
  const p=Math.max(0,Math.min(pct,100)); const rest=100-p;
  const color=pct>100?COL.red:pct>85?COL.amber:COL.grn;
  S.charts[id]=new Chart(el,{type:'doughnut',
    data:{datasets:[{data:[p,rest],backgroundColor:[color,'rgba(255,255,255,.06)'],borderWidth:0}]},
    options:{cutout:'76%',circumference:270,rotation:225,responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{enabled:false}}}});
}
function drawEvo(id){
  const el=document.getElementById(id); if(!el) return;
  const pm=porMes(S.peds); const labels=pm.map(x=>labelKey(x.key));
  const gasto=pm.map(x=>x.valor); const teto=pm.map(x=>tetoMes(x.key));
  S.charts[id]=new Chart(el,{type:'bar',
    data:{labels,datasets:[
      {label:'Gasto',data:gasto,backgroundColor:COL.red,borderRadius:6,order:2},
      {label:'Teto geral',data:teto,type:'line',borderColor:COL.amber,backgroundColor:'transparent',
        borderWidth:2,tension:.35,pointRadius:3,pointBackgroundColor:COL.amber,order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{usePointStyle:true,boxWidth:8}},tooltip:tooltipStyle},
      scales:{y:{ticks:{callback:v=>fmtK(v)},grid:{color:'rgba(255,255,255,.05)'}},x:{grid:{display:false}}}}});
}

  const semNF=S.peds.filter(p=>p.pago&&!p.temNF);
  const fornDef=S.peds.filter(p=>p.aDefinir);
  const aguardando=S.peds.filter(p=>/aguard|não disp|nao disp|pendente|encontr/i.test(p.previsao));
  // duplicidade de ID (mesma linha lançada 2x, sem ID COMPRA de agrupamento)
  const byId={}; S.peds.forEach(p=>{(byId[p.id]=byId[p.id]||[]).push(p);});
  const dups=Object.entries(byId).filter(([id,arr])=>arr.length>1 && !arr.every(x=>x.idCompra)).map(([id,arr])=>({id,n:arr.length,prod:arr[0].produto}));
  const card=(t,arr,color)=>`<div class="glass card-hover kpi"><div class="eyebrow">${t}</div><div class="num" style="color:${color}">${fmtInt(arr.length)}</div></div>`;
  const tbl=(arr,cols)=>`<div class="tbl-wrap"><table><thead><tr>${cols.map(c=>`<th class="${c.num?'num':''}">${c.h}</th>`).join('')}</tr></thead>
    <tbody>${arr.length?arr.slice(0,60).map(p=>`<tr>${cols.map(c=>`<td class="${c.num?'num mono':''}">${c.f(p)}</td>`).join('')}</tr>`).join('')
      :'<tr><td colspan="'+cols.length+'" class="center muted">Nada aqui — tudo certo.</td></tr>'}</tbody></table></div>`;
  const html=`
  <div class="grid g-kpi mb">
    ${card('EM compra sem valor',semValor,'var(--amber)')}
    ${card('Pago sem NF',semNF,'var(--red2)')}
    ${card('Fornecedor "A definir"',fornDef,'var(--amber)')}
    ${card('Previsão pendente',aguardando,'var(--blue)')}
    ${card('IDs duplicados',dups,'var(--red2)')}
  </div>
  <div class="glass mb"><div class="stitle">Aprovados sem valor lançado</div>
    <div class="sub">Foram para PEDIDOS mas ainda com R$ 0 — precisam do valor da compra</div>
    ${tbl(semValor,[{h:'ID',f:p=>p.id},{h:'Produto',f:p=>p.produto},{h:'Setor',f:p=>p.setor},{h:'Mês',f:p=>p.mesLabel},{h:'Fornecedor',f:p=>p.fornecedor}])}
  </div>
  <div class="grid g-2e mb">
    <div class="glass"><div class="stitle">Pago sem "Abrir Nota"</div>
      ${tbl(semNF,[{h:'ID',f:p=>p.id},{h:'Produto',f:p=>p.produto},{h:'Valor',num:1,f:p=>fmtBRL(p.valor)}])}</div>
    <div class="glass"><div class="stitle">Fornecedor "A definir"</div>
      ${tbl(fornDef,[{h:'ID',f:p=>p.id},{h:'Produto',f:p=>p.produto},{h:'Valor',num:1,f:p=>fmtBRL(p.valor)}])}</div>
  </div>
  <div class="glass"><div class="stitle">IDs duplicados sem agrupamento (ID COMPRA vazio)</div>
    <div class="sub">Podem ser lançamentos repetidos — vale conferir</div>
    ${tbl(dups,[{h:'ID',f:d=>d.id},{h:'Produto',f:d=>d.prod},{h:'Ocorrências',num:1,f:d=>d.n}])}
  </div>`;
  return html;
}

function viewExplorar(){
  const setores=[...new Set(S.peds.map(p=>p.setor))].sort();
  const formas=[...new Set(S.peds.map(p=>p.forma))].sort();
  const html=`
  <div class="glass">
    <div class="stitle">Explorar lançamentos</div>
    <div class="controls">
      <input type="text" id="fBusca" placeholder="Buscar produto / fornecedor / placa…" style="min-width:240px;flex:1">
      <select id="fMes"><option value="">Todos os meses</option>${S.mesKeys.map(k=>`<option value="${k}">${labelKey(k)}</option>`).join('')}</select>
      <select id="fSetor"><option value="">Todos os setores</option>${setores.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
      <select id="fForma"><option value="">Todas as formas</option>${formas.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
      <button class="btn" id="fCsv">⤓ CSV filtrado</button>
    </div>
    <div class="sub" id="fResumo"></div>
    <div class="tbl-wrap" style="max-height:600px"><table id="fTbl">
      <thead><tr><th>ID</th><th>Mês</th><th>Produto</th><th>Setor</th><th class="num">Valor</th><th>Fornecedor</th><th>Forma</th><th>Placa</th><th>NF</th></tr></thead>
      <tbody></tbody>
    </table></div>
  </div>`;
  viewExplorar._after=()=>{
    const apply=()=>{
      const q=up(document.getElementById('fBusca').value);
      const mk=document.getElementById('fMes').value, se=document.getElementById('fSetor').value, fo=document.getElementById('fForma').value;
      let rows=S.peds.filter(p=>
        (!mk||p.mesKey===mk)&&(!se||p.setor===se)&&(!fo||p.forma===fo)&&
        (!q||up(p.produto).includes(q)||up(p.fornecedor).includes(q)||up(p.placa).includes(q)));
      rows.sort((a,b)=>(b.idxmes-a.idxmes)||(b.valor-a.valor));
      const tot=rows.reduce((s,p)=>s+p.valor,0);
      document.getElementById('fResumo').innerHTML=`<b>${fmtInt(rows.length)}</b> linhas · total <b>${fmtBRL(tot)}</b>`;
      document.querySelector('#fTbl tbody').innerHTML=rows.slice(0,400).map(p=>`<tr>
        <td class="mono">${p.id}</td><td class="muted">${p.mesLabel}</td><td>${p.produto}</td><td>${p.setor}</td>
        <td class="num mono">${fmtBRL(p.valor)}</td><td>${p.fornecedor}</td><td>${p.forma}</td>
        <td class="mono">${p.placa||'—'}</td><td>${p.temNF?'<span class="chip ok"><span class="d"></span>NF</span>':'<span class="muted">—</span>'}</td></tr>`).join('')
        +(rows.length>400?`<tr><td colspan="9" class="center muted">Mostrando 400 de ${rows.length}. Refine o filtro.</td></tr>`:'');
      S._filtered=rows;
    };
    ['fBusca','fMes','fSetor','fForma'].forEach(id=>{const el=document.getElementById(id); el.oninput=apply; el.onchange=apply;});
    document.getElementById('fCsv').onclick=()=>{
      const rows=S._filtered||S.peds;
      const head=['ID','MES','PRODUTO','SETOR','VALOR','FORNECEDOR','FORMA','PLACA','NF'];
      const csv=[head.join(';')].concat(rows.map(p=>[p.id,p.mesLabel,'"'+p.produto.replace(/"/g,"'")+'"',p.setor,
        p.valor.toFixed(2).replace('.',','),'"'+p.fornecedor.replace(/"/g,"'")+'"',p.forma,p.placa,p.temNF?'SIM':'NAO'].join(';'))).join('\n');
      const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='iled_compras_filtrado.csv'; a.click();
    };
    apply();
  };
  return html;
}

/* ============================ PDF ============================ */
function gerarPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a4'});
  const W=doc.internal.pageSize.getWidth();
  const mk=S.mesAtual, gasto=gastoMes(mk), teto=tetoMes(mk), pct=teto?gasto/teto*100:0;
  const totalGeral=S.peds.reduce((s,p)=>s+p.valor,0);
  // cabeçalho barra preta com logo
  doc.setFillColor(8,8,10); doc.rect(0,0,W,92,'F');
  try{doc.addImage(LOGO,'PNG',32,20,150,52);}catch(e){}
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.text('RELATÓRIO DE COMPRAS',W-32,44,{align:'right'});
  doc.setTextColor(225,6,0); doc.setFontSize(11);
  doc.text('ILED Produções · '+labelKey(mk)+' · '+new Date().toLocaleDateString('pt-BR'),W-32,64,{align:'right'});
  // caixas indicadores
  let y=118;
  const boxes=[['Gasto no mês',fmtBRL(gasto)],['Teto geral',fmtBRL(teto)],['% do teto',pct.toFixed(1)+'%'],['Acumulado mar–jul',fmtBRL(totalGeral)]];
  const bw=(W-64-3*10)/4;
  boxes.forEach((b,i)=>{const x=32+i*(bw+10);
    doc.setDrawColor(210,210,210); doc.setLineWidth(.6); doc.roundedRect(x,y,bw,58,5,5,'S');
    doc.setTextColor(120,120,120); doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
    doc.text(b[0].toUpperCase(),x+10,y+18);
    doc.setTextColor(20,20,20); doc.setFont('helvetica','bold'); doc.setFontSize(13);
    doc.text(b[1],x+10,y+40);});
  y+=80;
  // tabela mensal
  const pm=porMes(S.peds);
  doc.autoTable({startY:y,head:[['Mês','Gasto','Linhas','Teto geral','% teto']],
    body:pm.map(r=>{const t=tetoMes(r.key); return [labelKey(r.key),fmtBRL(r.valor),String(r.qtd),t?fmtBRL(t):'—',t?(r.valor/t*100).toFixed(1)+'%':'—'];}),
    theme:'grid',headStyles:{fillColor:[225,6,0],textColor:255,fontStyle:'bold',fontSize:8},
    bodyStyles:{fontSize:8},alternateRowStyles:{fillColor:[245,245,247]},margin:{left:32,right:32}});
  y=doc.lastAutoTable.finalY+22;
  // top setores
  doc.setTextColor(20,20,20); doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('Top setores por gasto',32,y);
  doc.autoTable({startY:y+8,head:[['Setor','Gasto','Linhas']],
    body:porSetor(S.peds).slice(0,10).map(x=>[x.nome,fmtBRL(x.valor),String(x.qtd)]),
    theme:'grid',headStyles:{fillColor:[40,40,48],textColor:255,fontSize:8},bodyStyles:{fontSize:8},
    alternateRowStyles:{fillColor:[245,245,247]},margin:{left:32,right:32}});
  y=doc.lastAutoTable.finalY+22;
  if(y>720){doc.addPage(); y=48;}
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(20,20,20);
  doc.text('Top fornecedores',32,y);
  doc.autoTable({startY:y+8,head:[['Fornecedor','Total','Compras','Ticket']],
    body:porFornecedor(S.peds).slice(0,10).map(x=>[x.nome,fmtBRL(x.valor),String(x.qtd),fmtBRL(x.ticket)]),
    theme:'grid',headStyles:{fillColor:[61,116,255],textColor:255,fontSize:8},bodyStyles:{fontSize:8},
    alternateRowStyles:{fillColor:[245,245,247]},margin:{left:32,right:32}});
  // rodapé
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){doc.setPage(i); doc.setFontSize(7.5); doc.setTextColor(150,150,150);
    doc.text('ILED Produções · Painel de Compras · gerado automaticamente',32,doc.internal.pageSize.getHeight()-20);
    doc.text(i+'/'+pages,W-32,doc.internal.pageSize.getHeight()-20,{align:'right'});}
  doc.save('ILED_Compras_'+(mk||'geral')+'.pdf');
}

/* ============================ PARTÍCULAS ============================ */
function initParticles(){
  const cv=document.getElementById('particles'); const ctx=cv.getContext('2d');
  let W,H,parts;
  function resize(){W=cv.width=innerWidth; H=cv.height=innerHeight;
    parts=Array.from({length:46},()=>({x:Math.random()*W,y:Math.random()*H,
      r:.6+Math.random()*2,vy:.2+Math.random()*.6,a:.15+Math.random()*.5}));}
  resize(); addEventListener('resize',resize);
  (function loop(){ctx.clearRect(0,0,W,H);
    for(const p of parts){p.y-=p.vy; if(p.y<-6){p.y=H+6; p.x=Math.random()*W;}
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fillStyle='rgba(225,6,0,'+p.a+')';
      ctx.shadowBlur=8; ctx.shadowColor='rgba(225,6,0,.7)'; ctx.fill();}
    ctx.shadowBlur=0; requestAnimationFrame(loop);})();
}

/* ============================ INIT ============================ */
chartDefaults();
initParticles();
document.getElementById('reloadBtn').onclick=loadAll;
document.getElementById('pdfBtn').onclick=()=>{try{gerarPDF()}catch(e){alert('Erro ao gerar PDF: '+e.message)}};
loadAll();

</script>
